# Dployr Traffic Router Configuration
# Copy this to config.toml and customize for your deployment.
# The installer (install-traefik.sh) manages this file automatically.

[instance]
# Unique name for this traffic router instance — used for the dashboard hostname
# e.g. "us-east" → dashboard at traefik-us-east.dployr.io
name = "us-east"

[domains]
# Domain used for customer-facing traffic 
tld = "dployr.run"
# Connected dployr base server
base = "dployr.io"

[redis]
# Redis host managed by base — this service has read-only access
host = ""
port = 6379
username = ""
password = ""
# Redis key namespace Traefik reads routes from
root_key = "traefik"
# Enable TLS for Redis connection
tls = true
# Poll interval for route changes (seconds)
poll_interval = 2 

[tls]
# ACME email for Let's Encrypt certificate registration
acme_email = "hello@dployr.io"
# Cloudflare API token with Edit zone DNS permissions on the customer domain
# Required for wildcard certificate issuance via DNS challenge
cf_api_token = "cfat_Btn7..."

[dashboard]
# Basic auth credentials for the Traefik dashboard
username = "admin"
# bcrypt hash of the dashboard password — generated by installer
# Generate manually: htpasswd -nbB admin yourpassword
password_hash = ""
