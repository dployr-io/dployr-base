# Dployr Base Configuration
# Copy this to config.toml and customize for your deployment

[server]
port = 7878
host = "0.0.0.0"
base_url = "https://base.dployr.io"
app_url = "https://app.dployr.io"

[traefik]
# Traefik routing configuration
enabled = true
tld = "dployr.run"
# Reserved IPs attached to the Traefik droplet — used for apex domain A/AAAA records
ipv4 = "1.2.3.4"
ipv6 = "2001:db8::1"
# Traefik Prometheus metrics endpoint (base URL — /metrics is appended automatically)
metrics_url = "http://traefik-<instance>.dployr.run:8080"
# Separate Redis instance for Traefik routes
redis_url = "redis://redis-13196.c...:13196"
redis_host = "redis-13196.c.."
redis_port = 13196
redis_username = "default"
redis_password = "fDd..."

[database]

# PostgreSQL connection string
url = "postgresql://user:password@localhost:5432/postgres"

# Auto-run migrations on startup
auto_migrate = true

# Connection pool tuning (all optional — defaults shown)
# pool_max = 20                    # Max connections per process; multiply by replica count
# pool_min = 2                     # Connections kept warm; avoids cold-start latency
# pool_idle_timeout_ms = 10000     # Release idle connections after 10 s
# pool_connection_timeout_ms = 5000  # Throw if no free connection after 5 s — raise under heavy load
# pool_keep_alive = true           # TCP keep-alive; prevents stale connections on cloud hosts

[kv]
type = "redis"
url = "redis://localhost:6379"
# Optional: Upstash REST API (serverless-friendly)
# rest_url = "https://..."
# rest_token = "..."

[storage]
type = "filesystem"
# For filesystem
path = "./data/storage"
# For S3-compatible
# bucket = "dployr-logs"
# region = "us-east-1"
# access_key = ""
# secret_key = ""

[auth]
# OAuth providers
google_client_id = ""
google_client_secret = ""
github_client_id = ""
github_client_secret = ""

[admin]
admin_api_key = "12345"
allowed_ips = ["192.168.100.20", "127.0.0.1"]
totp_secret = "123456789"
# Generate with: openssl rand -hex 32
# metrics_scrape_token = ""

[integrations]
github_token = ""

[email]
# Email provider: "zepto" 
provider = "zepto"
zepto_api_key = "wSsVR612+EOlBvw..."
from_address = "email@example.com"

[security]
# Session TTL (seconds)
session_ttl = 86400
# JWT signing algorithm
jwt_algorithm = "RS256"
# Rate limiting (requests per minute)
global_rate_limit = 100
strict_rate_limit = 10
# AES-256-GCM key for encrypting service secrets (KEK — key-encrypting key).
# Generate with: openssl rand -hex 32
# Keep this secret and back it up. Losing it makes all service secrets unrecoverable.
# To rotate: generate a new key, run the rewrap migration, then update this value.
encryption_key = "bdd5f30db77378b48093ea7a54057060b5c2408851535d9f31e085fbad0a5800"
# Cloudflare Turnstile secret key — protects the email login endpoint from bots.
# Get it from: Cloudflare dashboard → Turnstile → your site → Secret Key
# Leave unset to disable verification (local development).
turnstile_secret_key = ""

[logging]
level = "info"  # debug | info | warn | error

[cors]
allowed_origins = "*.dployr.io"

[billing]
polar_access_token = "polar_oat_yM..."
polar_webhook_secret = "polar_whs_..."
polar_environment = "sandbox"

[billing.product_ids]
# Polar dashboard → Products → copy the product UUID for each plan
indie = "2e60e533-977f-4dea-a15c-8cbe838eebf7"
pro = "886a574b-cbed-4e69-a8b3-c601b99a6b22"

[proxy]
# Enable the built-in reverse proxy
enabled = false
port = 7878
host = "0.0.0.0"
# Wildcard base domain: routes service.cluster.<tld>
tld = "dployr.io"
# Request timeout in milliseconds
timeout_ms = 30000
# Route cache TTL in seconds
cache_ttl_seconds = 30

[virtual_machines]
# Cloud provider for VM provisioning
provider = "digitalocean"
# DigitalOcean personal access token
do_api_token = ""
# ssh key id on DigitalOcean
ssh_key = 12345678

[registry]
# OCI-compatible container registry for build artifacts.
# Build nodes push images here; instance nodes pull from it.
# DigitalOcean Container Registry format: registry.digitalocean.com/<registry-name>
url = "registry.digitalocean.com/dployr"
# Docker credentials for the registry.
# For DigitalOcean: use a personal access token (same value for username and password).
# Generate at: https://cloud.digitalocean.com/account/api/tokens
auth = ""
