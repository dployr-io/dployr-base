name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dployr_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/dployr_test
      REDIS_URL: redis://localhost:6379
      BASE_URL: http://localhost:7878

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - run: pnpm install

      - name: Start server
        run: pnpm run dev:app:test & 

      - name: Wait for server
        run: npx wait-on http://localhost:7878/v1/health --timeout 30000

      - name: Run integration tests
        run: pnpm test:api