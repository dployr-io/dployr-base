name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dployr_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/dployr_test
      REDIS_URL: redis://localhost:6379
      BASE_URL: http://localhost:7878

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create config
        run: |
          sed \
            -e 's|url = "postgresql://.*"|url = "postgresql://postgres:postgres@localhost:5432/dployr_test"|' \
            -e 's|allowed_origins = ".*"|allowed_origins = "*"|' \
            -e 's|base_url = "https://.*"|base_url = "http://localhost:7878"|' \
            config.example.toml > config.toml

      - name: Start server
        run: pnpm run dev:app:test & 

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:7878/v1/health && break
            sleep 1
          done

      - name: Run integration tests
        run: pnpm test:api