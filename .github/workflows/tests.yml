name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dployr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/dployr_test
      REDIS_URL: redis://localhost:6379
      BASE_URL: http://localhost:7878

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install tomato
        run: |
          curl -fsSL https://github.com/ceejbot/tomato/releases/download/v1.0.0/tomato-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /tmp
          mv /tmp/target/release/tomato /usr/local/bin/tomato
          chmod +x /usr/local/bin/tomato

      - name: Create config
        run: |
          cp config.example.toml config.test.toml
          tomato set database.url "postgresql://postgres:postgres@localhost:5432/dployr_test" config.test.toml
          tomato set kv.url "redis://localhost:6379" config.test.toml
          tomato set server.base_url "http://localhost:7878" config.test.toml
          tomato set cors.allowed_origins "*" config.test.toml
          tomato set traefik.enabled false config.test.toml

      - name: Run unit tests
        run: pnpm test:unit

      - name: Run integration tests
        run: pnpm test:api