services:
  base:
    image: ghcr.io/dployr-io/dployr-base:latest
    container_name: dployr-base
    user: "0:0"  # Run as root to fix Windows bind mount permissions (not recommended in prod)
    restart: unless-stopped
    ports:
      - "7878:7878"
    environment:      
      # Server
      PORT: "7878"
      HOST: "0.0.0.0"
      BASE_URL: "http://192.168.100.35:7878"  
      APP_URL: "http://192.168.100.35:5173"    
      
      # Database (SQLite - file-based)
      DB_TYPE: "sqlite"
      DB_PATH: "/data/dployr.db"
      
      # KV Store (Redis)
      KV_TYPE: "redis"
      KV_URL: "redis://redis:6379"
      
      # Storage (Filesystem)
      STORAGE_TYPE: "filesystem"
      STORAGE_PATH: "/data/storage"
      
      # Auth - OAuth Providers (OPTIONAL)
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      GITHUB_CLIENT_ID: ""
      GITHUB_CLIENT_SECRET: ""
      
      # Email (OPTIONAL)
      EMAIL_PROVIDER: "zepto"
      EMAIL_FROM: "noreply@zeipo.ai"
      ZEPTO_API_KEY: ""

      CORS_ALLOWED_ORIGINS: "http://192.168.100.35:9099,http://192.168.100.20:7879,http://192.168.100.35:7877,http://192.168.100.35:5173"
    volumes:
      - ./data:/data
    depends_on:
      - redis
    networks:
      - dployr-network

  redis:
    image: redis:7-alpine
    container_name: dployr-redis
    restart: unless-stopped
    ports:
      - "6379:6379" 
    volumes:
      - redis-data:/data
    networks:
      - dployr-network

  app:
    image: ghcr.io/dployr-io/dployr-web:latest
    container_name: dployr-web
    restart: unless-stopped
    ports:
      - "7877:80"
    environment:
      DPLOYR_BASE_URL: "http://192.168.100.35:7878"
    depends_on:
      - base
    networks:
      - dployr-network

  docs:
    image: caddy:alpine
    container_name: dployr-api-docs
    restart: unless-stopped
    ports:
      - "9099:80"
    environment:
      DPLOYR_BASE_URL: "http://192.168.100.35:7878"
    volumes:
      - ./docs:/src/docs:ro
    command:
      - sh
      - -c
      - |
          cp -r /src/docs/* /usr/share/caddy/ &&
          sed -i "s#https://base.dployr.io#${DPLOYR_BASE_URL:-http://192.168.100.35:7878}#" /usr/share/caddy/openapi.yaml &&
          caddy file-server --root /usr/share/caddy --listen :80
    networks:
      - dployr-network

  vector:
    image: timberio/vector:latest-alpine
    container_name: dployr-vector
    restart: unless-stopped
    ports:
      - "8686:8686"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/dployr-logs:/mnt/dployr-logs:ro
    entrypoint: ["sh", "-c"]
    command:
      - |
          cat > /tmp/vector.toml <<'EOF'
          [api]
          enabled = true
          address  = "0.0.0.0:8686"

          [sources.containers]
          type    = "docker_logs"
          exclude_containers = ["dployr-vector"]

          [sources.dployr_base]
          type    = "file"
          include = ["/mnt/dployr-logs/dployr-base.log"]

          [sinks.loki]
          type     = "loki"
          inputs   = ["containers"]
          endpoint = "http://loki:3100"
          encoding.codec = "text"

          [sinks.loki.labels]
          container = "{{ container_name }}"
          source    = "docker"

          [sinks.loki_base]
          type     = "loki"
          inputs   = ["dployr_base"]
          endpoint = "http://loki:3100"
          encoding.codec = "text"

          [sinks.loki_base.labels]
          container = "dployr-base"
          source    = "dev"
          EOF
          exec vector --config /tmp/vector.toml
    depends_on:
      - loki
    networks:
      - dployr-network

volumes:
  redis-data:

networks:
  dployr-network:
    driver: bridge
