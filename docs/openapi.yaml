  # ─── Client WebSocket ──────────────────────────────────────────────────────

  /v1/instances/stream:
    get:
      operationId: clientWebSocket
      tags: [Instances]
      summary: Client WebSocket for real-time cluster updates
      description: |
        WebSocket endpoint for browser/client connections. Authenticated via
        the `session` cookie. Pass `clusterId` as a query parameter.

        ## Connection
        Upgrade with `?clusterId=<id>` and a valid session cookie.

        ## Messages from client to base

        All messages (except `client_subscribe` and `ack`) require a `requestId` string for response correlation.

        | kind | description |
        |------|-------------|
        | `client_subscribe` | Subscribe to cluster status updates |
        | `log_subscribe` | Subscribe to log stream |
        | `log_unsubscribe` | Unsubscribe from log stream |
        | `log_stream` | Start a log stream with a token |
        | `file_read` | Read file content |
        | `file_write` | Write file content |
        | `file_create` | Create file or directory |
        | `file_delete` | Delete file or directory |
        | `file_tree` | Get filesystem tree |
        | `file_watch` | Watch for filesystem changes |
        | `file_unwatch` | Stop watching filesystem |
        | `instance_token_rotate` | Rotate bootstrap token |
        | `process_history` | Get process snapshots |
        | `terminal_open` | Open terminal session |
        | `terminal` | Send terminal input/resize/close |
        | `ack` | Acknowledge a server message |

        ## Messages from base to client

        | kind | description |
        |------|-------------|
        | `update` | Node status broadcast |
        | `log_chunk` | Log stream chunk |
        | `file_update` | Filesystem change notification |
        | `*_response` | Response to a client request, echoes `requestId` |
        | `error` | Error response, includes `requestId` and numeric `code` |

        ## Error codes
        See `WSErrorResponse` schema for numeric code meanings.
      parameters:
        - in: query
          name: clusterId
          required: true
          schema:
            type: string
      responses:
        '101':
          description: WebSocket upgrade
        '400':
          description: Missing clusterId
        '401':
          description: Invalid or missing session

  # ─── Domains ───────────────────────────────────────────────────────────────

  /v1/domains/register:
    post:
      operationId: registerInstanceDomain
      tags: [Domains]
      summary: Register instance with bootstrap token
      description: Called by the dployr daemon on first boot using the one-time token from instance creation.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Instance registered
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          instanceId:
                            type: string
                          domain:
                            type: string
                            example: my-instance.dployr.io
                          issuer:
                            type: string
                          audience:
                            type: string
                            example: dployr-instance
        '400':
          description: Invalid, expired, or already-used token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: Invalid or expired token
                  code: auth.bad_token

  /v1/domains/verify:
    get:
      operationId: caddyDomainVerify
      tags: [Domains]
      summary: Caddy TLS verification endpoint
      description: |
        Called internally by Caddy to verify domain ownership before issuing TLS certificates.
        Not intended for direct API consumer use.

        Returns plain text responses:
        - `ok` — domain is active or TXT record verified (activates domain)
        - `verification pending` — TXT record not yet found (403)
        - `domain not registered` — domain unknown (404)
        - `missing domain parameter` — no `domain` query param (400)
      security: []
      parameters:
        - in: query
          name: domain
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Domain verified or already active
          content:
            text/plain:
              schema:
                type: string
                example: ok
        '400':
          description: Missing domain parameter
          content:
            text/plain:
              schema:
                type: string
                example: missing domain parameter
        '403':
          description: TXT record not yet found
          content:
            text/plain:
              schema:
                type: string
                example: verification pending
        '404':
          description: Domain not registered
          content:
            text/plain:
              schema:
                type: string
                example: domain not registered

  /v1/domains:
    post:
      operationId: createCustomDomain
      tags: [Domains]
      summary: Create custom domain for an instance
      description: Requires developer role on the instance's cluster.
      security:
        - sessionCookie: []
      parameters:
        - in: query
          name: instanceId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [domain, clusterId]
              properties:
                domain:
                  type: string
                  example: api.example.com
                clusterId:
                  type: string
                  description: cluster id
      responses:
        '200':
          description: Domain created with DNS records to configure
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          domain:
                            type: string
                          provider:
                            type: string
                            enum: [cloudflare, godaddy, digitalocean, route53, namecheap, google, unknown]
                          hasOAuth:
                            type: boolean
                          record:
                            type: object
                            description: A record pointing to instance IP
                            properties:
                              type:
                                type: string
                                enum: [A]
                              name:
                                type: string
                              value:
                                type: string
                              ttl:
                                type: integer
                          verification:
                            type: object
                            description: TXT record for ownership verification
                            properties:
                              type:
                                type: string
                                enum: [TXT]
                              name:
                                type: string
                              value:
                                type: string
                          autoSetupUrl:
                            type: string
                            nullable: true
                          manualGuideUrl:
                            type: string
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Instance not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Domain registered to another instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: Domain already registered to another instance
                  code: resource.conflict

  /v1/domains/{domain}:
    get:
      operationId: getDomain
      tags: [Domains]
      summary: Get domain details
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: domain
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Domain status and records (pending domains include DNS records)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          domain:
                            type: string
                          status:
                            type: string
                            enum: [pending, active]
                          clusterId:
                            type: string
                          provider:
                            type: string
                            nullable: true
                          createdAt:
                            type: integer
                            format: int64
                          activatedAt:
                            type: integer
                            format: int64
                            nullable: true
                          record:
                            type: object
                            nullable: true
                          verification:
                            type: object
                            nullable: true
                          autoSetupUrl:
                            type: string
                            nullable: true
                          manualGuideUrl:
                            type: string
                            nullable: true
        '403':
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Domain not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      operationId: removeDomain
      tags: [Domains]
      summary: Remove custom domain
      description: Requires developer role on the instance's cluster.
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: domain
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Domain removed
        '403':
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Domain or instance not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/domains/{domain}/verify:
    post:
      operationId: verifyDomain
      tags: [Domains]
      summary: Trigger client-side domain TXT verification
      description: |
        Checks the DNS TXT record and activates the domain if verified.
        Returns 204 on success, 422 if TXT not found yet.
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: domain
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Domain verified and activated
        '404':
          description: Domain or instance not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: TXT record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: TXT record not found
                  code: request.unprocessable_entity
        '500':
          description: Verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/domains:
    get:
      operationId: listInstanceDomains
      tags: [Domains]
      summary: List domains for an instance
      security:
        - sessionCookie: []
      parameters:
        - in: query
          name: clusterId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Domains
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          domains:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: string
                                domain:
                                  type: string
                                status:
                                  type: string
                                  enum: [pending, active]
                                provider:
                                  type: string
                                  nullable: true
                                createdAt:
                                  type: integer
                                  format: int64
                                activatedAt:
                                  type: integer
                                  format: int64
                                  nullable: true
        '403':
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Instance not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/domains/callback/{provider}:
    get:
      operationId: domainOauthCallback
      tags: [Domains]
      summary: DNS provider OAuth callback
      security: []
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
            enum: [cloudflare, godaddy, digitalocean, google]
        - in: query
          name: code
          required: true
          schema:
            type: string
        - in: query
          name: state
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirect to frontend with OAuth status
        '400':
          description: Missing parameters or invalid state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─── Deployments ───────────────────────────────────────────────────────────

  /v1/deployments:
    get:
      operationId: listDeployments
      tags: [Deployments]
      summary: List deployments
      description: Deployment listing is not yet fully implemented. Returns empty list.
      security:
        - sessionCookie: []
      parameters:
        - in: query
          name: clusterId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deployments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

    post:
      operationId: createDeployment
      tags: [Deployments]
      summary: Create a new deployment (fire-and-return)
      description: |
        Creates a new deployment and dispatches it to the target node as a background task.
        Returns immediately with the deployment record and a task ID — the client should
        listen for a WS refresh signal to know when the deployment completes.

        Returns `409` if a service with that name already exists (either with a different
        type, suggesting a conflict, or the same type, suggesting a `PATCH` redeploy instead).

        > **Note:** The previous WebSocket `deploy` message is deprecated in favour of this endpoint.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [instanceName, payload]
              properties:
                instanceName:
                  type: string
                  description: Target instance tag/name
                payload:
                  type: object
                  required: [name, type, source]
                  properties:
                    name:
                      type: string
                    type:
                      type: string
                      enum: [docker, nixpacks, static]
                    source:
                      type: string
                      enum: [remote, image]
                  additionalProperties: true
                  description: Full DeploymentSchema payload
      responses:
        '201':
          description: Deployment created and dispatched
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          deployment:
                            $ref: '#/components/schemas/Deployment'
                          taskId:
                            type: string
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions (developer role required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Service already exists — use PATCH /v1/services/{serviceId} to redeploy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: Service already exists
                  code: resource.conflict
        '503':
          description: Node not connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─── Services ──────────────────────────────────────────────────────────────

  /v1/services:
    get:
      operationId: listServices
      tags: [Services]
      summary: List services for a cluster
      description: Requires viewer role on the cluster.
      security:
        - sessionCookie: []
      parameters:
        - in: query
          name: clusterId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Services retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          services:
                            type: array
                            items:
                              $ref: '#/components/schemas/Service'
        '400':
          description: Missing or invalid clusterId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/services/{serviceId}:
    get:
      operationId: getService
      tags: [Services]
      summary: Get a single service
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: serviceId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Service retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          service:
                            $ref: '#/components/schemas/Service'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Service not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      operationId: redeployService
      tags: [Services]
      summary: Redeploy an existing service (fire-and-return)
      description: |
        Triggers a redeployment of the service with a new payload. Dispatched as a
        background node task — returns immediately with the updated service, a new
        deployment record, and a task ID. The client should listen for a WS refresh
        signal to track completion. Requires developer role on the cluster.
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: serviceId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [instanceName, payload]
              properties:
                instanceName:
                  type: string
                  description: Target instance tag/name
                payload:
                  type: object
                  description: DeploymentPayload — same shape as POST /v1/deployments body payload
                  additionalProperties: true
      responses:
        '200':
          description: Redeploy dispatched
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          service:
                            $ref: '#/components/schemas/Service'
                          deployment:
                            $ref: '#/components/schemas/Deployment'
                          taskId:
                            type: string
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions (developer role required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Service not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Node not connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      operationId: deleteService
      tags: [Services]
      summary: Remove a service
