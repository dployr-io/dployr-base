  # ─── Billing ───────────────────────────────────────────────────────────────

  /v1/billing/plans:
    get:
      operationId: listBillingPlans
      tags: [Billing]
      summary: List available subscription plans
      security: []
      responses:
        '200':
          description: Plans
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          plans:
                            type: array
                            items:
                              $ref: '#/components/schemas/PlanDefinition'

  /v1/billing/status:
    get:
      operationId: getBillingStatus
      tags: [Billing]
      summary: Get subscription status for a cluster
      description: Requires viewer role on the cluster.
      security:
        - sessionCookie: []
      parameters:
        - in: query
          name: clusterId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Subscription status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          plan:
                            $ref: '#/components/schemas/SubscriptionPlan'
                          planDetails:
                            $ref: '#/components/schemas/PlanDefinition'
                          subscription:
                            nullable: true
                            type: object
                            properties:
                              status:
                                $ref: '#/components/schemas/SubscriptionStatus'
                              polarSubscriptionId:
                                type: string
                                nullable: true
                              createdAt:
                                type: integer
                                format: int64
                              updatedAt:
                                type: integer
                                format: int64
        '400':
          description: Missing clusterId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Billing not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/billing/checkout:
    post:
      operationId: createBillingCheckout
      tags: [Billing]
      summary: Create a checkout session
      description: Requires owner role on the cluster. Returns a Polar checkout URL.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan, clusterId]
              properties:
                plan:
                  type: string
                  enum: [indie, pro]
                clusterId:
                  type: string
                successUrl:
                  type: string
                  format: uri
      responses:
        '200':
          description: Checkout URL
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          checkoutUrl:
                            type: string
                            format: uri
                          customerId:
                            type: string
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Owner role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: Only the cluster owner can manage billing
                  code: permission.owner_role_required
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Billing not configured or checkout failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/billing/webhook:
    post:
      operationId: billingWebhook
      tags: [Billing]
      summary: Polar billing webhook receiver
      description: |
        Receives Polar subscription lifecycle events.
        Signature verified via `webhook-signature` header using HMAC-SHA256.

        Handled events:
        - `subscription.created`
        - `subscription.updated`
        - `subscription.canceled`
        - `subscription.revoked`
        - `subscription.uncanceled`
        - `subscription.past_due`
        - `order.created`
      security: []
      parameters:
        - in: header
          name: webhook-signature
          required: true
          schema:
            type: string
          description: HMAC-SHA256 signature in format `v1=<hex>`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  example: subscription.created
                data:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Webhook received
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: true
        '400':
          description: Invalid signature or malformed body
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: false
        '500':
          description: Webhook secret not configured
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: false

  # ─── Runtime ───────────────────────────────────────────────────────────────

  /v1/runtime/compatibility/check:
    post:
      operationId: checkCompatibility
      tags: [Runtime]
      summary: Check dployrd compatibility
      description: |
        Called by the daemon on startup to verify its `compatibility_date` meets
        the base server requirement. Public — no auth required.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [compatibilityDate]
              properties:
                compatibilityDate:
                  type: string
                  pattern: '^\d{4}-\d{2}-\d{2}$'
                  example: "2025-12-28"
                version:
                  type: string
                  example: v0.4.8
      responses:
        '200':
          description: Compatibility result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          compatible:
                            type: boolean
                          compatibilityDate:
                            type: string
                          version:
                            type: string
                          latestVersion:
                            type: string
                          upgradeLevel:
                            type: string
                            enum: [major, minor, patch, none]
                          requiredCompatibilityDate:
                            type: string
                          message:
                            type: string
              examples:
                compatible:
                  value:
                    success: true
                    data:
                      compatible: true
                      compatibilityDate: "2025-12-28"
                      version: v0.4.8
                      latestVersion: v0.4.8
                      upgradeLevel: none
                      requiredCompatibilityDate: "2025-12-28"
                      message: dployrd is supported
                incompatible:
                  value:
                    success: true
                    data:
                      compatible: false
                      compatibilityDate: "2025-10-01"
                      version: v0.3.0
                      latestVersion: v0.4.8
                      upgradeLevel: major
                      requiredCompatibilityDate: "2025-12-28"
                      message: dployrd requires compatibility_date 2025-12-28 (received: 2025-10-01)
        '400':
          description: Invalid date format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/runtime/versions:
    get:
      operationId: listRuntimeVersions
      tags: [Runtime]
      summary: List available dployrd versions from GitHub releases
      security: []
      parameters:
        - in: query
          name: showPreReleases
          schema:
            type: boolean
          description: Include prerelease versions
      responses:
        '200':
          description: Available versions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          latest:
                            type: string
                            nullable: true
                          oldestSupportedVersion:
                            type: string
                            nullable: true
                          versions:
                            type: array
                            items:
                              type: string
                          includePreReleases:
                            type: boolean
        '500':
          description: Failed to fetch from GitHub
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/runtime/events:
    get:
      operationId: getRuntimeEvents
      tags: [Runtime]
      summary: Get runtime events for a cluster
      description: Requires viewer role.
      security:
        - sessionCookie: []
      parameters:
        - in: query
          name: clusterId
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
        - in: query
          name: type
          schema:
            type: string
          description: Filter by event type code
        - in: query
          name: search
          schema:
            type: string
          description: Free-text search across event payloads
        - in: query
          name: sort
          schema:
            type: string
            enum: [newest, oldest]
          description: Sort order. Default is newest.
        - in: query
          name: window
          schema:
            type: string
            enum: [all, 24h, 7d, 30d]
          description: Time window filter. Default is all.
      responses:
        '200':
          description: Paginated events
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaginatedResponse'
        '400':
          description: Missing clusterId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─── Nodes ─────────────────────────────────────────────────────────────────

  /v1/node/token:
    post:
      operationId: nodeRefreshToken
      tags: [Nodes]
      summary: Exchange node token for a fresh short-lived token
      description: |
        Called by the daemon to refresh its access token.
        Accepts an existing bootstrap or node token (may be expired for bootstrap type).
      security:
        - bearerAuth: []
      responses:
        '200':
          description: New token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token:
                            type: string
        '401':
          description: Invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: Invalid token
                  code: auth.bad_token
        '404':
          description: Instance not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/node/cert:
    post:
      operationId: registerNodeCert
      tags: [Nodes]
      summary: Register instance client certificate
      description: Stores certificate in instance metadata. Returns 409 if cert already exists.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: instanceId
          schema:
            type: string
        - in: query
          name: instanceName
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientCertUpdate'
      responses:
        '204':
          description: Certificate registered
        '400':
          description: Missing params or invalid body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Instance not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Certificate already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      operationId: updateNodeCert
      tags: [Nodes]
      summary: Update instance client certificate
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: instanceId
          schema:
            type: string
        - in: query
          name: instanceName
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientCertUpdate'
      responses:
        '204':
          description: Certificate updated
        '400':
          description: Missing params or invalid body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Instance not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/node/ws:
    get:
      operationId: nodeWebSocket
      tags: [Nodes]
      summary: Node WebSocket for task delivery
      description: |
        Upgrades to a WebSocket for the dployrd daemon. Authenticated via
        Bearer token in the `Authorization` header.

        ## Protocol

        ### Base → Node
        | kind | description |
        |------|-------------|
        | `hello` | Sent on connect: `{ kind: "hello", status: "accepted", timestamp: number }` |
        | `task` | Task delivery: `{ kind: "task", items: DaemonTask[] }` |

        ### Node → Base
        | kind | description |
        |------|-------------|
        | `update` | Status broadcast (v1 or v1.1 schema) — relayed to connected clients |
        | `task_response` | Result of a completed task |
        | `log_chunk` | Log stream data chunk |

        Tasks are push-based. The base sends tasks immediately when a node connects
        or when a client request requires node action.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: instanceId
          schema:
            type: string
        - in: query
          name: instanceName
          schema:
            type: string
      responses:
        '101':
          description: WebSocket upgrade
        '400':
          description: Missing instance identifier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Instance not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/terminal/ws:
    get:
      operationId: terminalRelayWebSocket
      tags: [Nodes]
      summary: Terminal relay WebSocket — node outbound connection
      description: |
        The node connects here after receiving a `terminal_open` task.
        Relays I/O between the node and the client WebSocket session.

        Authenticated via Bearer token. The `sessionId` must match one
        registered by a prior `terminal_open` client message.

        ### Node → Base (forwarded to client)
        ```json
        { "action": "output", "data": "terminal output" }
        ```

        ### Base → Node (from client input)
        ```json
        { "action": "input", "data": "user input", "sessionId": "..." }
        { "action": "resize", "cols": 80, "rows": 24, "sessionId": "..." }
        { "action": "close" }
        ```
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: sessionId
          required: true
          schema:
            type: string
      responses:
        '101':
          description: WebSocket upgrade
        '400':
          description: Missing sessionId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Session not found or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: WebSocket handler unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─── Proxy ─────────────────────────────────────────────────────────────────

  /v1/proxy/resolve:
    get:
      operationId: resolveProxyRoute
      tags: [Proxy]
      summary: Resolve hostname to service route
      description: Debug endpoint. Requires authentication.
      security:
        - sessionCookie: []
      parameters:
        - in: query
          name: hostname
          required: true
          schema:
            type: string
          example: api.production.dployr.io
      responses:
        '200':
          description: Resolved route
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          hostname:
                            type: string
                          parsed:
                            type: object
                            properties:
                              serviceName:
                                type: string
                              clusterName:
                                type: string
                          route:
                            type: object
                            properties:
                              serviceName:
                                type: string
                              clusterName:
                                type: string
                              instanceAddress:
                                type: string
                              instancePort:
                                type: integer
                              serviceId:
                                type: string
                              instanceId:
                                type: string
        '400':
          description: Missing hostname or invalid format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: hostname query parameter is required
                  code: validation.missing_fields
        '404':
          description: Service not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: Service not found
                  code: resource.missing_resource

  /v1/proxy/stats:
    get:
      operationId: getProxyStats
      tags: [Proxy]
      summary: Get proxy router statistics
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Router stats
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          router:
                            type: object
                            properties:
                              cacheSize:
                                type: integer
                              baseDomain:
                                type: string
                          baseDomain:
                            type: string

  /v1/proxy/services:
    get:
      operationId: listProxyServices
      tags: [Proxy]
      summary: List routable services for a cluster
      description: Requires viewer role on the cluster.
      security:
        - sessionCookie: []
      parameters:
        - in: query
          name: clusterId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Routable services
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          clusterId:
                            type: string
                          clusterName:
                            type: string
                          baseDomain:
                            type: string
                          services:
                            type: array
                            items:
                              type: object
                              properties:
                                serviceName:
                                  type: string
                                instanceId:
                                  type: string
                                instanceTag:
                                  type: string
                                url:
                                  type: string
                                  format: uri
        '400':
          description: Missing clusterId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Cluster not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/proxy/invalidate:
    post:
      operationId: invalidateProxyCache
      tags: [Proxy]
      summary: Invalidate proxy route cache
      description: Requires viewer role. Pass `all: true` to clear all, or `serviceName + clusterName` for a specific route.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                serviceName:
                  type: string
                clusterName:
                  type: string
                all:
                  type: boolean
      responses:
        '200':
          description: Cache invalidated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Insufficient parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: Specify serviceName+clusterName, clusterName, or all:true
                  code: validation.missing_fields

  # ─── Proxy Node Management ─────────────────────────────────────────────────

  /v1/proxy/node/status:
    get:
      operationId: getProxyNodeStatus
      tags: [Proxy]
      summary: Get proxy status on a node (fire-and-return)
      description: |
        Dispatches a proxy status task to the target node and returns immediately
        with a task ID. The client should listen for a WS refresh signal for the result.
        Requires developer role on the cluster.
      security:
        - sessionCookie: []
      parameters:
        - in: query
          name: instanceName
          required: true
          schema:
            type: string
          description: Target instance tag/name
        - in: query
          name: clusterId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task dispatched
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          taskId:
                            type: string
                          message:
                            type: string
        '400':
          description: Missing instanceName
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions (developer role required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Node not connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/proxy/node/restart:
    post:
      operationId: restartProxyNode
      tags: [Proxy]
      summary: Restart proxy on a node (fire-and-return)
      description: |
        Dispatches a proxy restart task to the target node and returns immediately.
        Requires developer role on the cluster.
      security:
        - sessionCookie: []
      parameters:
        - in: query
          name: clusterId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [instanceName]
              properties:
                instanceName:
                  type: string
                  description: Target instance tag/name
                force:
                  type: boolean
                  default: false
                  description: Force restart even if proxy is healthy
      responses:
        '200':
          description: Restart task dispatched
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          taskId:
                            type: string
                          message:
                            type: string
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions (developer role required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Node not connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/proxy/node/routes:
    post:
      operationId: addProxyNodeRoute
      tags: [Proxy]
      summary: Add a proxy route on a node (fire-and-return)
      description: |
        Dispatches a proxy route add task to the target node and returns immediately.
        Requires developer role on the cluster.
      security:
        - sessionCookie: []
      parameters:
        - in: query
          name: clusterId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [instanceName, serviceName, upstream]
              properties:
                instanceName:
                  type: string
                  description: Target instance tag/name
                serviceName:
                  type: string
                upstream:
                  type: string
                  description: Upstream address (host:port)
                domain:
                  type: string
                  nullable: true
                  description: Optional custom domain
                template:
                  type: string
                  nullable: true
                  description: Optional proxy template name
      responses:
        '202':
          description: Route add task dispatched
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          taskId:
                            type: string
                          message:
                            type: string
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions (developer role required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Node not connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

